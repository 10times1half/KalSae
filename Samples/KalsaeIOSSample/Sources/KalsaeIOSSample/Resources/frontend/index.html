<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Kalsae iOS Sample</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif;
      margin: 0; padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
      display: flex; flex-direction: column; gap: 16px;
      min-height: 100vh; box-sizing: border-box;
    }
    h1 { font-size: 22px; margin: 24px 0 0 0; }
    p  { margin: 0; line-height: 1.4; opacity: 0.8; }
    button {
      padding: 12px 16px; font-size: 16px; border-radius: 12px;
      border: 1px solid currentColor; background: transparent; color: inherit;
    }
    pre {
      background: rgba(127,127,127,0.12); padding: 12px; border-radius: 8px;
      font-size: 13px; white-space: pre-wrap; word-break: break-word; margin: 0;
    }
  </style>
</head>
<body>
  <h1>Kalsae iOS Sample</h1>
  <p>WKWebView ??Swift IPC bridge. 아래 버튼은 <code>@KSCommand func greet</code> 를 호출한다.</p>
  <button id="greet">greet("iOS") 호출</button>
  <pre id="out">(결과가 여기에 표시됩니다)</pre>
  <script>
    document.getElementById("greet").addEventListener("click", async () => {
      const out = document.getElementById("out");
      try {
        // Kalsae IPC ??`__KS_` 네임스페이스는 document-start 스크립트에서 주입.
        const result = await window.__KS_.invoke("greet", { name: "iOS" });
        out.textContent = JSON.stringify(result, null, 2);
      } catch (e) {
        out.textContent = "Error: " + (e && e.message ? e.message : String(e));
      }
    });
  </script>
</body>
</html>
