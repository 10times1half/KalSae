name: Phase 9 macOS E2E Verification

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  phase9-macos-e2e:
    name: Phase 9 macOS E2E
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Build Demo Product
        run: swift build --product kalsae-demo

      - name: Run Unit Tests
        run: swift test

      - name: CLI Smoke Test
        run: swift run kalsae --help
