name: Phase 10 Linux E2E Verification

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  phase10-linux-e2e:
    name: Phase 10 Linux E2E
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux GUI Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libsoup-3.0-dev \
            xdg-utils \
            libnotify-bin

      - name: Show Swift Version
        run: swift --version

      - name: Lint Code Format
        run: swift format lint --strict --recursive Sources Tests 2>&1 ; if [ $? -ne 0 ]; then exit 1; fi

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Build Demo Product
        run: swift build --product kalsae-demo -Xswiftc -warnings-as-errors

      - name: Run Linux Platform Integration Tests
        env:
          XDG_RUNTIME_DIR: /tmp
        run: swift test --filter "KSLinux" --no-parallel -Xswiftc -warnings-as-errors

      - name: Run Unit Tests
        run: swift test -Xswiftc -warnings-as-errors

      - name: CLI Smoke Test
        run: swift run kalsae --help
