name: Windows Build Verification

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  windows-build:
    name: Windows (Swift + WebView2)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.3.1-release
          swift-build: 6.3.1-RELEASE

      - name: Show Swift Version
        run: swift --version

      - name: Lint Code Format
        run: swift format lint --strict --recursive Sources Tests 2>&1 ; if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Fetch WebView2 SDK
        shell: pwsh
        run: ./Scripts/fetch-webview2.ps1

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Build Demo Product
        run: swift build --product kalsae-demo -Xswiftc -warnings-as-errors

      - name: Run Unit Tests
        run: swift test -Xswiftc -warnings-as-errors
