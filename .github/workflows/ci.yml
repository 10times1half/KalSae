name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            setup-swift: true
            swift-version: swift-6.3.1-release
            swift-build: 6.3.1-RELEASE
            fetch-webview2: true

          - name: macOS
            os: macos-14
            setup-swift: false

          - name: Linux
            os: ubuntu-24.04
            setup-swift: false
            apt-deps: >-
              libgtk-4-dev
              libwebkitgtk-6.0-dev
              libsoup-3.0-dev
              xdg-utils
              libnotify-bin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift (Windows)
        if: matrix.setup-swift
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: ${{ matrix.swift-version }}
          swift-build: ${{ matrix.swift-build }}

      - name: Show Swift Version
        run: swift --version

      - name: Install Linux GUI Dependencies
        if: matrix.apt-deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt-deps }}

      - name: Smoke Check WebView2 Path Resolution (Windows)
        if: matrix.fetch-webview2
        shell: pwsh
        run: ./Scripts/smoke-fetch-webview2.ps1

      - name: Fetch WebView2 SDK (Windows)
        if: matrix.fetch-webview2
        shell: pwsh
        run: ./Scripts/fetch-webview2.ps1

      - name: Lint Code Format (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          swift format --help *> $null
          if ($LASTEXITCODE -eq 0) {
            swift format lint --strict --recursive Sources Tests
            if ($LASTEXITCODE -ne 0) { exit 1 }
          } else {
            swift-format --help *> $null
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Neither 'swift format' nor 'swift-format' is available on PATH."
              exit 1
            }

            swift-format lint --strict --recursive Sources Tests
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }

      - name: Lint Code Format (Unix)
        if: runner.os != 'Windows'
        run: |
          if swift format --help >/dev/null 2>&1; then
            swift format lint --strict --recursive Sources Tests
          elif command -v swift-format >/dev/null 2>&1; then
            swift-format lint --strict --recursive Sources Tests
          else
            echo "Neither 'swift format' nor 'swift-format' is available on PATH." >&2
            exit 1
          fi

      - name: Cache SwiftPM Build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Build Demo Product
        run: swift build --product kalsae-demo -Xswiftc -warnings-as-errors

      - name: Run Unit Tests
        run: swift test -Xswiftc -warnings-as-errors

      - name: Run Linux Platform Integration Tests
        if: runner.os == 'Linux'
        env:
          XDG_RUNTIME_DIR: /tmp
        run: swift test --filter "KSLinux" --no-parallel -Xswiftc -warnings-as-errors

      - name: CLI Smoke Test
        if: runner.os != 'Windows'
        run: swift run kalsae --help
