name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ci:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            setup-swift: true
            swift-version: swift-6.3.1-release
            swift-build: 6.3.1-RELEASE
            fetch-webview2: true
            apt-deps: ''

          # macOS / Linux 잡은 일시적으로 비활성화한다.
          # 다시 켜려면 아래 두 블록의 주석을 해제하면 된다.
          # - name: macOS
          #   os: macos-14
          #   setup-swift: true
          #   swift-version: swift-6.3.1-release
          #   swift-build: 6.3.1-RELEASE
          #
          # - name: Linux
          #   os: ubuntu-24.04
          #   setup-swift: true
          #   swift-version: swift-6.3.1-release
          #   swift-build: 6.3.1-RELEASE
          #   apt-deps: >-
          #     libgtk-4-dev
          #     libwebkitgtk-6.0-dev
          #     libsoup-3.0-dev
          #     xdg-utils
          #     libnotify-bin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        if: matrix.setup-swift
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: ${{ matrix.swift-version }}
          swift-build: ${{ matrix.swift-build }}

      - name: Show Swift Version
        run: swift --version

      - name: Install Linux GUI Dependencies
        if: matrix.apt-deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt-deps }}

      - name: Smoke Check WebView2 Path Resolution (Windows)
        if: matrix.fetch-webview2
        shell: pwsh
        run: ./Scripts/smoke-fetch-webview2.ps1

      - name: Fetch WebView2 SDK (Windows)
        if: matrix.fetch-webview2
        shell: pwsh
        run: ./Scripts/fetch-webview2.ps1

      - name: Lint Code Format (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          swift format --help *> $null
          if ($LASTEXITCODE -eq 0) {
            swift format lint --strict --recursive Sources Tests
            if ($LASTEXITCODE -ne 0) { exit 1 }
          } else {
            swift-format --help *> $null
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Neither 'swift format' nor 'swift-format' is available on PATH."
              exit 1
            }

            swift-format lint --strict --recursive Sources Tests
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }

      - name: Lint Code Format (Unix)
        if: runner.os != 'Windows'
        run: |
          if swift format --help >/dev/null 2>&1; then
            swift format lint --strict --recursive Sources Tests
          elif command -v swift-format >/dev/null 2>&1; then
            swift-format lint --strict --recursive Sources Tests
          else
            echo "Neither 'swift format' nor 'swift-format' is available on PATH." >&2
            exit 1
          fi

      - name: Cache SwiftPM Build
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Build Demo Product
        run: swift build --product kalsae-demo -Xswiftc -warnings-as-errors

      - name: Build Release Artifact (Windows tags)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          swift build -c release --product kalsae-demo -Xswiftc -warnings-as-errors

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item .build\release\kalsae-demo.exe dist\kalsae-demo.exe -Force
          Compress-Archive -Path dist\kalsae-demo.exe -DestinationPath dist\kalsae-demo-windows-x64.zip -Force

      - name: Run Unit Tests
        run: swift test -Xswiftc -warnings-as-errors

      - name: Publish GitHub Release Asset (Windows tags)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --generate-notes
          }

          gh release upload $tag dist\kalsae-demo-windows-x64.zip --clobber

      - name: Run Linux Platform Integration Tests
        if: runner.os == 'Linux'
        env:
          XDG_RUNTIME_DIR: /tmp
        run: swift test --filter "KSLinux" --no-parallel -Xswiftc -warnings-as-errors

      - name: CLI Smoke Test
        if: runner.os != 'Windows'
        run: swift run kalsae --help
