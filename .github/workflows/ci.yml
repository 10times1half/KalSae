name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ci:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            setup-swift: true
            swift-version: swift-6.3.1-release
            swift-build: 6.3.1-RELEASE
            fetch-webview2: true
            apt-deps: ''

          # macOS / Linux 잡은 일시적으로 비활성화한다.
          # 다시 켜려면 아래 두 블록의 주석을 해제하면 된다.
          # - name: macOS
          #   os: macos-14
          #   setup-swift: true
          #   swift-version: swift-6.3.1-release
          #   swift-build: 6.3.1-RELEASE
          #
          # - name: Linux
          #   os: ubuntu-24.04
          #   setup-swift: true
          #   swift-version: swift-6.3.1-release
          #   swift-build: 6.3.1-RELEASE
          #   apt-deps: >-
          #     libgtk-4-dev
          #     libwebkitgtk-6.0-dev
          #     libsoup-3.0-dev
          #     xdg-utils
          #     libnotify-bin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate tag matches source version
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $expected = $tag -replace '^v', ''

          $raw = Get-Content Sources/KalsaeCore/KSVersion.swift -Raw
          $match = [regex]::Match($raw, 'public\s+static\s+let\s+current\s*=\s*"([^"]+)"')
          if (-not $match.Success) {
            Write-Error "Could not extract KSVersion.current from Sources/KalsaeCore/KSVersion.swift"
            exit 1
          }

          $actual = $match.Groups[1].Value
          if ($actual -ne $expected) {
            Write-Error "Tag version '$expected' does not match KSVersion.current '$actual'"
            exit 1
          }

      - name: Setup Swift
        if: matrix.setup-swift
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: ${{ matrix.swift-version }}
          swift-build: ${{ matrix.swift-build }}

      - name: Show Swift Version
        run: swift --version

      - name: Install Linux GUI Dependencies
        if: matrix.apt-deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt-deps }}

      - name: Smoke Check WebView2 Path Resolution (Windows)
        if: matrix.fetch-webview2
        shell: pwsh
        run: ./Scripts/smoke-fetch-webview2.ps1

      - name: Fetch WebView2 SDK (Windows)
        if: matrix.fetch-webview2
        shell: pwsh
        run: ./Scripts/fetch-webview2.ps1

      - name: Lint Code Format (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          swift format --help *> $null
          if ($LASTEXITCODE -eq 0) {
            swift format lint --strict --recursive Sources Tests
            if ($LASTEXITCODE -ne 0) { exit 1 }
          } else {
            swift-format --help *> $null
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Neither 'swift format' nor 'swift-format' is available on PATH."
              exit 1
            }

            swift-format lint --strict --recursive Sources Tests
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }

      - name: Lint Code Format (Unix)
        if: runner.os != 'Windows'
        run: |
          if swift format --help >/dev/null 2>&1; then
            swift format lint --strict --recursive Sources Tests
          elif command -v swift-format >/dev/null 2>&1; then
            swift-format lint --strict --recursive Sources Tests
          else
            echo "Neither 'swift format' nor 'swift-format' is available on PATH." >&2
            exit 1
          fi

      - name: Cache SwiftPM Build
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Build Demo Product
        run: swift build --product kalsae-demo -Xswiftc -warnings-as-errors

      - name: Build Release Artifact (Windows tags)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          swift build -c release --product kalsae-demo -Xswiftc -warnings-as-errors
          swift build -c release --product kalsae       -Xswiftc -warnings-as-errors

          $releaseDir = (Resolve-Path .build\release).Path
          $demoExe    = Join-Path $releaseDir 'kalsae-demo.exe'
          $demoRes    = Join-Path $releaseDir 'Kalsae_KalsaeDemo.resources'
          $cliExe     = Join-Path $releaseDir 'kalsae.exe'
          $loader     = Join-Path $releaseDir 'WebView2Loader.dll'

          if (-not (Test-Path $demoExe)) { Write-Error "missing $demoExe"; exit 1 }
          if (-not (Test-Path $demoRes)) { Write-Error "missing $demoRes"; exit 1 }
          if (-not (Test-Path $cliExe))  { Write-Error "missing $cliExe";  exit 1 }

          # kalsae-demo: exe 단독으로는 리소스 번들을 못 찾으므로 폴더째 zip.
          New-Item -ItemType Directory -Force -Path dist\kalsae-demo | Out-Null
          Copy-Item $demoExe dist\kalsae-demo\ -Force
          Copy-Item $demoRes dist\kalsae-demo\ -Recurse -Force
          if (Test-Path $loader) { Copy-Item $loader dist\kalsae-demo\ -Force }
          Compress-Archive `
            -Path dist\kalsae-demo\* `
            -DestinationPath dist\kalsae-demo-windows-x64.zip `
            -Force

          # kalsae CLI는 단독 exe로도 동작.
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $cliExe dist\kalsae.exe -Force

      - name: Run Unit Tests
        run: swift test -Xswiftc -warnings-as-errors

      - name: Publish GitHub Release Asset (Windows tags)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/') && always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --generate-notes
          }

          if (-not (Test-Path dist\kalsae-demo-windows-x64.zip)) {
            Write-Error "Missing release asset: dist\\kalsae-demo-windows-x64.zip"
            exit 1
          }

          if (-not (Test-Path dist\kalsae.exe)) {
            Write-Error "Missing release asset: dist\\kalsae.exe"
            exit 1
          }

          gh release upload $tag dist\kalsae-demo-windows-x64.zip --clobber
          gh release upload $tag dist\kalsae.exe --clobber

      - name: Run Linux Platform Integration Tests
        if: runner.os == 'Linux'
        env:
          XDG_RUNTIME_DIR: /tmp
        run: swift test --filter "KSLinux" --no-parallel -Xswiftc -warnings-as-errors

      - name: CLI Smoke Test
        if: runner.os != 'Windows'
        run: swift run kalsae --help
